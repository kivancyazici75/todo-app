<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .input-area {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filters button {
      padding: 6px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: transparent;
      font-size: 0.82rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list {
      padding: 10px 0;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 30px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      gap: 12px;
      transition: background 0.15s;
    }

    .todo-item:hover {
      background: #f9fafb;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-word;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .edit-btn {
      background: transparent;
      border: none;
      color: #d1d5db;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .edit-btn:hover {
      color: #4f46e5;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .todo-item.editing .todo-text,
    .todo-item.editing .edit-btn,
    .todo-item.editing .delete-btn,
    .todo-item.editing input[type="checkbox"] {
      display: none;
    }

    .edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 1.5px solid #4f46e5;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }

    .save-btn {
      padding: 6px 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    .save-btn:hover {
      background: #4338ca;
    }

    .cancel-btn {
      padding: 6px 10px;
      background: transparent;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #6b7280;
      cursor: pointer;
      flex-shrink: 0;
    }

    .cancel-btn:hover {
      background: #f3f4f6;
    }

    .footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #6b7280;
    }

    .clear-btn {
      background: transparent;
      border: none;
      color: #ef4444;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fee2e2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Yapılacaklar</h1>
      <div class="subtitle">Günlük görevlerini takip et</div>
    </div>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="120">
      <button id="addBtn" onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <div class="error-bar" id="errorBar" style="display:none;background:#fee2e2;color:#b91c1c;font-size:.82rem;padding:10px 20px;"></div>
    <div class="todo-list" id="todoList"><div style="text-align:center;color:#9ca3af;font-size:.9rem;padding:30px;">Yükleniyor...</div></div>

    <div class="footer">
      <span id="statusText">0 görev</span>
      <button class="clear-btn" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://lwaoegnarishkhzocbaw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3YW9lZ25hcmlzaGtoem9jYmF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwMjEsImV4cCI6MjA5MjI4NTAyMX0.r6KQ7hsVajDZUiwN3QaquOQxGp19jkdeUBQCxfjHlvM';
    const BASE = `${SUPABASE_URL}/rest/v1/todos`;
    const HEADERS = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Prefer': 'return=representation'
    };

    let todos = [];
    let filter = 'all';

    const input = document.getElementById('todoInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    async function api(method, url, body) {
      const res = await fetch(url, {
        method,
        headers: HEADERS,
        body: body ? JSON.stringify(body) : undefined
      });
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    function showError(msg) {
      const bar = document.getElementById('errorBar');
      bar.textContent = msg;
      bar.style.display = 'block';
      setTimeout(() => bar.style.display = 'none', 4000);
    }

    async function loadTodos() {
      try {
        todos = await api('GET', `${BASE}?select=*&order=created_at.asc`);
        render();
      } catch (e) {
        showError('Görevler yüklenemedi: ' + e.message);
        document.getElementById('todoList').innerHTML = '<div class="empty">Yüklenemedi</div>';
      }
    }

    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      input.disabled = true;
      try {
        const [created] = await api('POST', BASE, { text, done: false });
        todos.push(created);
        input.value = '';
        render();
      } catch (e) {
        showError('Eklenemedi: ' + e.message);
      } finally {
        btn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    async function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const newDone = !todo.done;
      todo.done = newDone;
      render();
      try {
        await api('PATCH', `${BASE}?id=eq.${id}`, { done: newDone });
      } catch (e) {
        todo.done = !newDone;
        render();
        showError('Güncellenemedi: ' + e.message);
      }
    }

    async function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      render();
      try {
        await api('DELETE', `${BASE}?id=eq.${id}`);
      } catch (e) {
        showError('Silinemedi: ' + e.message);
        await loadTodos();
      }
    }

    async function clearDone() {
      if (!todos.some(t => t.done)) return;
      todos = todos.filter(t => !t.done);
      render();
      try {
        await api('DELETE', `${BASE}?done=eq.true`);
      } catch (e) {
        showError('Silinemedi: ' + e.message);
        await loadTodos();
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Görev bulunamadı</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="todo-item" id="item-${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
            <span class="todo-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</span>
            <button class="edit-btn" onclick="startEdit(${t.id})" title="Düzenle">&#x270E;</button>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Sil">&#x2715;</button>
          </div>
        `).join('');
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('statusText').textContent =
        `${active} aktif / ${todos.length} görev`;
    }

    function startEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const item = document.getElementById(`item-${id}`);
      item.classList.add('editing');
      item.insertAdjacentHTML('beforeend', `
        <input class="edit-input" id="edit-input-${id}" value="${escapeHtml(todo.text)}" maxlength="120">
        <button class="save-btn" onclick="saveEdit(${id})">Kaydet</button>
        <button class="cancel-btn" onclick="cancelEdit(${id})">İptal</button>
      `);
      const editInput = document.getElementById(`edit-input-${id}`);
      editInput.focus();
      editInput.setSelectionRange(editInput.value.length, editInput.value.length);
      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEdit(id);
        if (e.key === 'Escape') cancelEdit(id);
      });
    }

    async function saveEdit(id) {
      const editInput = document.getElementById(`edit-input-${id}`);
      const newText = editInput.value.trim();
      if (!newText) return;
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const oldText = todo.text;
      todo.text = newText;
      render();
      try {
        await api('PATCH', `${BASE}?id=eq.${id}`, { text: newText });
      } catch (e) {
        todo.text = oldText;
        render();
        showError('Güncellenemedi: ' + e.message);
      }
    }

    function cancelEdit(id) {
      const item = document.getElementById(`item-${id}`);
      if (!item) return;
      item.classList.remove('editing');
      item.querySelectorAll('.edit-input, .save-btn, .cancel-btn').forEach(el => el.remove());
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadTodos();
  </script>
</body>
</html>
